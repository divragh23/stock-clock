# nginx site for Stock Clock.
# Install to /etc/nginx/sites-available/stockclock and symlink into
# sites-enabled, then `nginx -t && systemctl reload nginx`.
#
# nginx serves the built React static files and reverse-proxies /api to uvicorn.
# Because the SPA and the API share one origin, the browser never makes a
# cross-origin call — no CORS needed in production.

server {
    listen 80;
    listen [::]:80;
    server_name stock.div23.app;

    # Built frontend (output of `npm run build`).
    root /opt/stockclock/frontend/dist;
    index index.html;

    # Access control is handled IN THE APP (account logins) — see the API's
    # /api/auth/* endpoints — so nginx serves the SPA openly and the backend
    # rejects unauthenticated API calls with 401.

    # SPA routing: try the file, then fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API -> uvicorn on localhost:8000
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
